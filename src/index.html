<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Pop Lyrics Agent</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="logo" aria-label="K-Pop Lyrics Agent">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36" aria-hidden="true">
          <circle cx="18" cy="18" r="17" stroke="currentColor" stroke-width="1.5"/>
          <path d="M13 24V14l10-2v10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="11" cy="24" r="2" fill="currentColor"/>
          <circle cx="21" cy="22" r="2" fill="currentColor"/>
        </svg>
        <span class="logo-text">한글 Lyrics</span>
      </div>

      <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="app-main">
    <section class="search-section">
      <h1 class="search-title">Find a K-pop song on Genius</h1>
      <p class="search-subtitle">Enter a song title and artist to find the original, romanized, and English lyrics pages.</p>

      <form class="search-form" id="searchForm">
        <input type="text" id="titleInput" class="search-input" placeholder="Song title" aria-label="Song title" required />
        <input type="text" id="artistInput" class="search-input" placeholder="Artist (optional)" aria-label="Artist name" />
        <button type="submit" class="btn btn-primary" id="searchBtn">Find Lyrics</button>
      </form>

      <p class="error-msg" id="errorMsg" role="alert" hidden></p>
      <div class="feedback-card" id="feedbackCard" hidden></div>
    </section>

    <section class="candidate-section" id="candidateSection" hidden>
      <div class="candidate-header">
        <h2 class="candidate-title">Choose the correct song</h2>
        <p class="candidate-subtitle">These were the closest Genius matches.</p>
      </div>
      <div class="candidate-list" id="candidateList"></div>
    </section>

    <section class="song-info" id="songInfo" hidden>
      <img class="song-art" id="songArt" src="" alt="" width="72" height="72" loading="lazy"/>
      <div class="song-meta">
        <p class="song-title" id="songTitle"></p>
        <p class="song-artist" id="songArtist"></p>
      </div>
      <button class="btn btn-ghost" id="downloadBtn">↓ Download links (.txt)</button>
    </section>

    <section class="lyrics-grid" id="lyricsGrid" hidden></section>
  </main>

  <script type="module" src="./js/genius.js"></script>
  <script type="module" src="./js/export.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
