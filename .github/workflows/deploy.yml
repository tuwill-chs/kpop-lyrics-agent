name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Inject Genius token
        run: |
          sed -i "s/YOUR_GENIUS_CLIENT_ACCESS_TOKEN/${{ secrets.GENIUS_ACCESS_TOKEN }}/g" src/js/genius.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./src
      - uses: actions/deploy-pages@v4